<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrito de Compras - E-commerce</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/components/Header.css">
    <link rel="stylesheet" href="src/styles/components/Cart.css">
    <link rel="stylesheet" href="src/styles/components/Footer.css">
</head>
<body>
    <!-- Header -->
    <header role="banner" class="header">
        <div class="container">
            <div class="header__inner">
                <a href="index.html" class="header__logo">
                    <h1>🛍️ E-Store</h1>
                </a>
                <a href="index.html" class="header__back">← Continuar comprando</a>
                <div class="header__actions">
                    <a href="cart.html" class="header__cart header__cart--active" aria-label="Carrito de compras">
                        🛒 <span class="cart-count">0</span>
                    </a>
                    <a href="login.html" class="header__auth" aria-label="Iniciar sesión">👤</a>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main role="main" class="main-content">
        <div class="container">
            <h1>Mi Carrito de Compras</h1>

            <div class="cart-wrapper">
                <!-- Cart Items -->
                <section class="cart-items">
                    <div class="cart-status" id="cartStatus">
                        <p>Tu carrito está vacío</p>
                        <a href="index.html" class="btn btn-primary">Continuar comprando</a>
                    </div>

                    <table class="cart-table" id="cartTable" style="display: none;">
                        <thead>
                            <tr>
                                <th>Producto</th>
                                <th>Precio</th>
                                <th>Cantidad</th>
                                <th>Subtotal</th>
                                <th>Acción</th>
                            </tr>
                        </thead>
                        <tbody id="cartItems">
                            <!-- Cart items will be populated here -->
                        </tbody>
                    </table>
                </section>

                <!-- Cart Summary -->
                <aside class="cart-summary" id="cartSummary" style="display: none;">
                    <h2>Resumen del Pedido</h2>
                    
                    <div class="summary-row">
                        <span>Subtotal:</span>
                        <span id="subtotalAmount">$0.00</span>
                    </div>
                    
                    <div class="summary-row">
                        <span>Envío:</span>
                        <span id="shippingAmount">$0.00</span>
                    </div>
                    
                    <div class="summary-row">
                        <input type="checkbox" id="freeShipping">
                        <label for="freeShipping">Envío gratis (pedidos > $100)</label>
                    </div>

                    <hr>

                    <div class="summary-row summary-total">
                        <span>Total:</span>
                        <span id="totalAmount">$0.00</span>
                    </div>

                    <button class="btn btn-primary btn-lg" id="checkoutBtn">
                        Ir a Checkout
                    </button>

                    <button class="btn btn-secondary btn-lg" id="continuShoppingBtn">
                        Continuar comprando
                    </button>

                    <hr>

                    <div class="promo-code">
                        <label for="promoCode">Código de promoción:</label>
                        <div class="promo-input-group">
                            <input type="text" id="promoCode" placeholder="Ingresa código...">
                            <button id="applyPromoBtn" class="btn btn-sm">Aplicar</button>
                        </div>
                    </div>

                    <button class="btn btn-danger btn-lg" id="clearCartBtn">
                        Vaciar Carrito
                    </button>
                </aside>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer role="contentinfo" class="footer">
        <div class="container">
            <div class="footer__bottom">
                <p>&copy; 2026 E-Store. Todos los derechos reservados.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="src/js/mockdata.js"></script>
    <script src="src/js/cart.js"></script>
    <script src="src/js/ui.js"></script>
</body>
</html>
