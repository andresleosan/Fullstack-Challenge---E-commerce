<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - E-commerce</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/components/Auth.css">
</head>
<body>
    <!-- Main Content -->
    <main role="main" class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <h1>Iniciar Sesión</h1>
                <p class="auth-subtitle">Bienvenido de nuevo a E-Store</p>

                <form id="loginForm" class="auth-form">
                    <div class="form-group">
                        <label for="loginEmail">Email:</label>
                        <input type="email" id="loginEmail" class="form-input" placeholder="tu@email.com" required>
                        <span class="form-error" id="loginEmailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Contraseña:</label>
                        <input type="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
                        <span class="form-error" id="loginPasswordError"></span>
                    </div>

                    <div class="form-group">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">Recuérdame</label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg">
                        Iniciar Sesión
                    </button>
                </form>

                <div class="auth-divider">O</div>

                <p class="auth-text">
                    ¿No tienes cuenta? 
                    <a href="register.html" class="auth-link">Registrarse aquí</a>
                </p>

                <div class="form-error" id="loginError"></div>
            </div>

            <aside class="auth-sidebar">
                <h2>Acceso Rápido</h2>
                <p>Prueba estas credenciales (simuladas):</p>
                <ul class="demo-creds">
                    <li>Email: <code>user@example.com</code></li>
                    <li>Contraseña: <code>123456</code></li>
                </ul>
            </aside>
        </div>
    </main>

    <!-- Scripts -->
    <script src="src/js/mockdata.js"></script>
    <script src="src/js/ui.js"></script>
</body>
</html>
