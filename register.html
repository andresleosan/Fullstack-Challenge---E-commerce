<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse - E-commerce</title>
    <link rel="stylesheet" href="src/styles/global.css">
    <link rel="stylesheet" href="src/styles/components/Auth.css">
</head>
<body>
    <!-- Main Content -->
    <main role="main" class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <h1>Crear Cuenta</h1>
                <p class="auth-subtitle">Únete a E-Store hoy</p>

                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="registerName">Nombre Completo:</label>
                        <input type="text" id="registerName" class="form-input" placeholder="Tu nombre" required>
                        <span class="form-error" id="registerNameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email:</label>
                        <input type="email" id="registerEmail" class="form-input" placeholder="tu@email.com" required>
                        <span class="form-error" id="registerEmailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Contraseña:</label>
                        <input type="password" id="registerPassword" class="form-input" placeholder="Mínimo 6 caracteres" required>
                        <span class="form-error" id="registerPasswordError"></span>
                    </div>

                    <div class="form-group">
                        <label for="registerPasswordConfirm">Confirmar Contraseña:</label>
                        <input type="password" id="registerPasswordConfirm" class="form-input" placeholder="Confirma tu contraseña" required>
                        <span class="form-error" id="registerPasswordConfirmError"></span>
                    </div>

                    <div class="form-group">
                        <input type="checkbox" id="terms" required>
                        <label for="terms">Acepto los términos y condiciones</label>
                        <span class="form-error" id="termsError"></span>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg">
                        Crear Cuenta
                    </button>
                </form>

                <p class="auth-text">
                    ¿Ya tienes cuenta? 
                    <a href="login.html" class="auth-link">Inicia sesión aquí</a>
                </p>

                <div class="form-error" id="registerError"></div>
            </div>

            <aside class="auth-sidebar">
                <h2>Beneficios de Registrarse</h2>
                <ul>
                    <li>✓ Acceso a ofertas exclusivas</li>
                    <li>✓ Historial de compras</li>
                    <li>✓ Checkout más rápido</li>
                    <li>✓ Notificaciones de productos</li>
                </ul>
            </aside>
        </div>
    </main>

    <!-- Scripts -->
    <script src="src/js/mockdata.js"></script>
    <script src="src/js/ui.js"></script>
</body>
</html>
